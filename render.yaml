services:
  - type: web
    name: whatsapp-bridge-bot
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO.git
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: DATABASE_URL
        value: sqlite:///whatsapp_bot.db
      - key: LOG_LEVEL
        value: INFO
